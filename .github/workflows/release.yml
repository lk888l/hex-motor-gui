# Cross-platform build & release for the Tauri app.
#
#   • push to main / PRs    → build all platforms, upload artifacts to the run
#   • push a tag `v*`       → build all platforms, create a DRAFT GitHub Release
#                             with every bundle attached
#   • manual (Run workflow) → build all platforms, upload artifacts
#
# Bundles produced per platform (bundle.targets = "all" in tauri.conf.json):
#   • Linux (ubuntu-22.04) → .deb + .AppImage   (x86-64)
#   • Windows (windows-latest) → .msi + .exe NSIS installer  (x86-64)
#   • macOS (macos-latest) → .dmg + .app, built `universal` (Intel + Apple Silicon)
#
# ⚠️ PREREQUISITES for a green CI build — two things must resolve in a FRESH
# checkout (hex-motor / can-transport / canopen-sdo are already crates.io deps):
#   1. hex-arm-dynamics — publish it to crates.io. Cargo.toml now uses
#      `hex-arm-dynamics = "0.1.0"` (no longer a path dep).
#   2. The shared proto — build.rs compiles `../../hex-robot-proto/proto` by
#      default, a SIBLING repo NOT present in CI. Provide it one of:
#        • vendor the .proto into this repo + point ROBOT_PROTO_DIR at it, OR
#        • add a CI step that checks out hex-robot-proto + set ROBOT_PROTO_DIR, OR
#        • fetch via buf (`buf export`) / depend on a published proto crate.
#
# ⚠️ Bundles here are UNSIGNED. macOS users hit Gatekeeper (right-click → Open);
# Windows users hit SmartScreen. Add code signing later via tauri-action env.

name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Needed for the tag-triggered GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon runner; builds a universal binary
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04 # oldest target → forward-compatible glibc / WebKitGTK
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Shared proto contract lives in a sibling repo; build.rs compiles it via
      # ROBOT_PROTO_DIR. Check it out (pinned commit) so a fresh CI checkout resolves.
      # Bump `ref` when the proto changes; switch to `main` if you prefer latest.
      # Pinned to the commit that includes controller config, EE/lift, machine
      # layout and URDF mount-link messages — no tag carries all of them yet.
      - name: Check out shared proto (hex-robot-proto)
        uses: actions/checkout@v4
        with:
          repository: hex-meow/hex-robot-proto
          ref: e52860ad1226af49b46f702033d9eb94fa17248e
          path: _proto
      - name: Verify shared proto inputs
        shell: bash
        run: |
          for file in common controller robot base arm ee lift events; do
            test -f "_proto/proto/$file.proto" || {
              echo "Missing shared proto: $file.proto" >&2
              exit 1
            }
          done
      - name: Point the build at the shared proto
        shell: bash # forward-slash relative path → works on Linux/macOS/Windows
        run: echo "ROBOT_PROTO_DIR=../_proto/proto" >> "$GITHUB_ENV"

      # Tauri v2 Linux runtime/build deps: WebKitGTK 4.1, GTK3, libsoup3, etc.
      # libfuse2 lets the AppImage tooling run. (gs_usb uses pure-Rust nusb, so
      # no libusb/libudev needed.)
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential pkg-config libssl-dev \
            libfuse2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `npm run build` (beforeBuildCommand) + `tauri build`,
      # using the local @tauri-apps/cli devDependency. On a tag it creates (or
      # appends to) the GitHub Release and uploads this platform's bundles.
      - name: Build Tauri bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "hex-motor-gui ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            Unsigned builds for Linux / Windows / macOS.

            - **Linux** — `.deb` (`sudo apt install ./hex-motor-gui_*.deb`) or `.AppImage` (`chmod +x` then run).
            - **Windows** — `.msi` or the NSIS `.exe` installer.
            - **macOS** — `.dmg` (universal, Intel + Apple Silicon). Unsigned: right-click → Open the first time to get past Gatekeeper.

      # For non-tag runs there is no Release, so attach the bundles to the run.
      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: hex-motor-gui-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*
          if-no-files-found: warn
